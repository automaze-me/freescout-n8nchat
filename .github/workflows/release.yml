name: Release

# On a version tag (e.g. v1.0.0), build the install zip and publish a GitHub Release.
# The zip contains a top-level N8nChat/ folder so users extract it straight into
# FreeScout's Modules/ directory (-> Modules/N8nChat/).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build module zip
        # git archive honors export-ignore in .gitattributes and prefixes every
        # entry with N8nChat/ so it unpacks to Modules/N8nChat/.
        run: git archive --format=zip --prefix=N8nChat/ -o N8nChat.zip HEAD

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" N8nChat.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
